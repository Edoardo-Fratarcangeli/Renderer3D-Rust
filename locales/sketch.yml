  fr: Sélectionnez des surfaces fermées à arêtes communes, puis composez un solide
  de: Geschlossene Flächen mit gemeinsamen Kanten wählen und zu einem Körper fügen
"sketch.no_surfaces":
  en: No surfaces yet — create one above
  it: Nessuna superficie — creane una sopra
