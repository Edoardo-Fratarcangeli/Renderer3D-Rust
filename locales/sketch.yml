# ── Composer ─────────────────────────────────────────────────────────────────
"sketch.composer_heading":
  en: Solid composer
  it: Compositore di solidi
  es: Compositor de sólidos
  fr: Compositeur de solides
  de: Volumenkörper-Komposition
"sketch.composer_hint":
  en: Select closed surfaces sharing edges, then compose them into a solid
  it: Seleziona superfici chiuse con lati in comune, poi componile in un solido
